# DeepResearch Agent Configuration

api:
  openai_base_url: "http://localhost:8080/v1"
  openai_api_key: ""
  tavily_api_key: ""

settings:
  use_dynamic_webpage_analysis: true
  search_provider: "duckduckgo"

# Per-tool quotas (per invocation of the agent)
quotas:
  orchestrator:
    delegate_research_task: 5
    write_todos: 10
    read_todos: 25
    write_file: 5
    read_file: 5
  researcher:
    web_search: 4
    analyze_webpage: 5
    think_tool: 12
  url_analyzer:
    read_full_page: 1
    grep_page: 15
    read_page_chunk: 10
    think_tool: 10
