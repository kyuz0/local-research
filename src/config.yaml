api:
  openai_base_url: 'http://localhost:8080/v1'
  openai_model: local-model
settings:
  use_dynamic_webpage_analysis: true
  search_provider: duckduckgo
  use_bm25_hints: false
search_profile: default
profiles:
  shallow:
    description: Fast and lightweight search, suitable for quick facts, expect 1-2
      solid sources per claim.
    quotas:
      orchestrator:
        delegate_research_task: 1
        write_todos: 3
        read_todos: 3
        write_file: 3
        read_file: 3
        max_tokens: 5000
      researcher:
        web_search: 2
        analyze_webpage: 3
        think_tool: 5
        max_tokens: 5000
      url_analyzer:
        read_full_page: 1
        grep_page: 8
        read_page_chunk: 5
        think_tool: 3
        max_tokens: 5000
        max_chunk_lines: 150
        max_grep_matches: 10
        max_static_chars: 30000
  default:
    description: Balanced search with moderate depth, expect 2-3 solid sources per
      claim.
    quotas:
      orchestrator:
        delegate_research_task: 3
        write_todos: 15
        read_todos: 15
        write_file: 7
        read_file: 7
        max_tokens: 8000
      researcher:
        web_search: 3
        analyze_webpage: 7
        think_tool: 10
        max_tokens: 8000
      url_analyzer:
        read_full_page: 1
        grep_page: 15
        read_page_chunk: 10
        think_tool: 8
        max_tokens: 7000
        max_chunk_lines: 150
        max_grep_matches: 10
        max_static_chars: 60000
  deep:
    description: Extensive research, slower but covers more sources. Expect 4+ solid
      sources per claim, exploring multiple angles.
    quotas:
      orchestrator:
        delegate_research_task: 8
        write_todos: 30
        read_todos: 30
        write_file: 10
        read_file: 10
        max_tokens: 10000
      researcher:
        web_search: 6
        analyze_webpage: 15
        think_tool: 30
        max_tokens: 10000
      url_analyzer:
        read_full_page: 1
        grep_page: 50
        read_page_chunk: 25
        think_tool: 30
        max_tokens: 10000
        max_chunk_lines: 150
        max_grep_matches: 10
        max_static_chars: 100000
